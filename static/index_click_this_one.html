<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Domino3D</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #101018; }
    body { display: flex; flex-direction: column; color: #e6e6ee;
           font: 14px system-ui, sans-serif; }
    #app { flex: 1 1 auto; min-height: 0; width: 100%; }  /* min-height:0 lets the canvas shrink */

    #controls { flex: 0 0 auto; background: #9d9d9d; border-bottom: 1px solid #2c2c3a; }
    .controls-bar { display: flex; align-items: center; justify-content: space-between;
                    padding: 6px 12px; }
    .controls-title { font-weight: 600; }
    #controls-toggle { background: #9d9d9d; color: #e6e6ee; border: 1px solid #3a3a4c;
                       border-radius: 4px; padding: 2px 10px; cursor: pointer; }
    #controls-toggle:hover { background: #9d9d9d; }
    .controls-fields { display: flex; flex-wrap: wrap; gap: 14px;
                       padding: 0 12px 10px; }
    .controls-fields label { display: flex; align-items: center; gap: 6px; }
    .controls-fields input, .controls-fields select { background: #070707; color: #e6e6ee;
                             border: 1px solid #3a3a4c; border-radius: 4px;
                             padding: 4px 6px; }
    .controls-fields input[type="number"] { width: 70px; }
    #controls.collapsed .controls-fields { display: none; }
  </style>
</head>
<body>
  <form id="controls" onsubmit="return false">
    <div class="controls-bar">
      <span class="controls-title">Domino Structure</span>
      <button type="button" id="controls-toggle" aria-expanded="true"
              aria-controls="controls-fields">Hide &#9662;</button>
    </div>
    <div class="controls-fields" id="controls-fields">
      <label>Structure Type:
        <select name="structureType">
          <option value="1x1-tower">1x1-tower</option>
          <option value="field">field</option>
          <option value="sideways-field">sideways-field</option>
          <option value="step-wall">step-wall</option>
          <option value="tower">tower</option>
          <option value="wall">wall</option>
        </select>
      </label>
      <label>Start Tile Type:
        <select name="startTileType">
          <option value="start">start</option>
        </select>
      </label>
      <label>Number of Tiles for Structure:</label>
      <label>X
        <input type="number" name="tilesX" step="1" min="1" />
      </label>
      <label>Y
        <input type="number" name="tilesY" step="1" min="1" />
      </label>
      <label>Z
        <input type="number" name="tilesZ" step="1" min="1" />
      </label>
      <button type="button" id="build-btn">Build Structure</button>
    </div>
  </form>
  <div id="app"></div>
  <script>
    (function () {
      const panel = document.getElementById("controls");
      const btn = document.getElementById("controls-toggle");
      btn.addEventListener("click", () => {
        const collapsed = panel.classList.toggle("collapsed");
        btn.setAttribute("aria-expanded", String(!collapsed));
        btn.innerHTML = collapsed ? "Show &#9656;" : "Hide &#9662;";
      });
    })();
  </script>
  <script>
    (function () {
      // Hard-coded from static/data/patterns/*.json's start_tiles (scanned by hand;
      // update this alongside the <select> options above if patterns are added/removed).
      const START_TILES_BY_STRUCTURE = {
        "1x1-tower": ["start"],
        "field": ["start"],
        "sideways-field": ["start"],
        "step-wall": ["start-a", "start-b", "start-c"],
        "tower": ["start"],
        "wall": ["start-back", "start-front"],
      };
      const structureSelect = document.querySelector('select[name="structureType"]');
      const startTileSelect = document.querySelector('select[name="startTileType"]');
      function populateStartTiles() {
        const tiles = START_TILES_BY_STRUCTURE[structureSelect.value] || [];
        startTileSelect.innerHTML = tiles
          .map((t) => `<option value="${t}">${t}</option>`)
          .join("");
      }
      structureSelect.addEventListener("change", populateStartTiles);
      populateStartTiles();
    })();
  </script>
  <!-- Offline entry point: plain classic scripts (not type="module"), so this works
       when double-clicked directly (file://) with no server at all. dist/data.js sets
       window.EMBEDDED_DOMINO_DATA; dist/bundle.js is scene.js + structure_builder.js +
       Three.js + OrbitControls bundled into one self-contained script. Regenerate both
       via build_offline.bat (or `npm run build`) after changing scene.js,
       structure_builder.js, or any static/data/** file. -->
  <script src="dist/data.js"></script>
  <script src="dist/bundle.js"></script>
</body>
</html>
